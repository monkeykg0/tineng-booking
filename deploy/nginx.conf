# 证书由 acme.sh 安装到 ./certs/，文件名约定：api.crt/api.key、admin.crt/admin.key

server {
    listen 80;
    server_name api.goumiaomu.cn admin.goumiaomu.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name api.goumiaomu.cn;

    ssl_certificate     /etc/nginx/certs/api.crt;
    ssl_certificate_key /etc/nginx/certs/api.key;

    client_max_body_size 5m;

    location / {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name admin.goumiaomu.cn;

    ssl_certificate     /etc/nginx/certs/admin.crt;
    ssl_certificate_key /etc/nginx/certs/admin.key;

    root /usr/share/nginx/html/admin;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json;

    # umi 单页应用路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }
}
