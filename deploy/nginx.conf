# 证书由 acme.sh 安装到 ./certs/，文件名约定：api.crt/api.key、admin.crt/admin.key

server {
    listen 80;
    server_name api.goumiaomu.cn admin.goumiaomu.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name api.goumiaomu.cn;

    ssl_certificate     /etc/nginx/certs/api.crt;
    ssl_certificate_key /etc/nginx/certs/api.key;

    client_max_body_size 5m;

    location / {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name admin.goumiaomu.cn;

    ssl_certificate     /etc/nginx/certs/admin.crt;
    ssl_certificate_key /etc/nginx/certs/admin.key;

    root /usr/share/nginx/html/admin;
    index index.html;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1k;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # 带 hash 的静态资源一年强缓存；index.html 不缓存保证发版即时生效
    location ~* \.(js|css|png|jpg|svg|woff2?|ico)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # umi 单页应用路由回退
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
