services:
  api:
    build: ../backend
    restart: unless-stopped
    env_file: .env
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tineng
      POSTGRES_USER: tineng
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # 2c4g 单机内存预算：shared_buffers 256MB（技术方案 5.1）
    command: postgres -c shared_buffers=256MB -c max_connections=50
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tineng"]
      interval: 5s
      timeout: 3s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./admin-dist:/usr/share/nginx/html/admin:ro
    depends_on:
      - api

volumes:
  pgdata:
